name: Notify on Failure

on:
  workflow_run:
    workflows:
      - "Test Backend"
      - "Dependency Scan"
      - "Container Scan"
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Pipeline FAILED: *${{ github.event.workflow_run.name }}*\nRepo: ${{ github.repository }}\nBranch: ${{ github.event.workflow_run.head_branch }}\nURL: ${{ github.event.workflow_run.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
